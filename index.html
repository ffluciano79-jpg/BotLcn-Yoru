<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#05050a;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND ANIME */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1541562232579-512a21360020') center/cover;
  opacity:0.2;
  z-index:-2;
}

/* GLOW EFFECT */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(255,0,85,0.15), transparent 70%);
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:10;
}

nav h1{
  color:#ff0055;
  font-family:'Orbitron';
}

nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
  position:relative;
}

nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:#ff0055;
  left:0;
  bottom:-4px;
  transition:.3s;
}

nav a:hover::after{
  width:100%;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero img{
  width:130px;
  border-radius:50%;
  box-shadow:0 0 30px #ff0055;
  margin-bottom:20px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.hero h2{
  font-size:3rem;
  font-family:'Orbitron';
}

.hero p{
  opacity:0.7;
  margin:10px 0 25px;
}

/* BUTTONS */
.btn-group{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff0055,#ff3c8d);
  color:#fff;
  cursor:pointer;
  transition:.3s;
  font-weight:bold;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #ff0055;
}

/* CHAT SIMULADO */
.chat-box{
  margin-top:40px;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:15px;
  width:280px;
  font-size:13px;
  text-align:left;
}

.msg{
  margin:8px 0;
}

.bot{
  color:#00ffcc;
}

.user{
  text-align:right;
  color:#fff;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  transition:.3s;
  border:1px solid rgba(255,0,100,0.2);
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px rgba(255,0,100,0.4);
}

/* STATUS */
.status{
  font-size:1.6rem;
  color:#00ff88;
  margin-top:10px;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.4}
  100%{opacity:1}
}

footer{
  text-align:center;
  padding:25px;
  opacity:0.6;
}
</style></head><body><nav>
  <h1>Yoru</h1>
  <div>
    <a href="#">Início</a>
    <a href="#funcoes">Funções</a>
    <a href="#status">Status</a>
  </div>
</nav><section class="hero">
  <img src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">
  <h2>Yoru Bot</h2>
  <p id="typing"></p>  <div class="btn-group">
    <button class="btn" onclick="toggleMusic()">🎵 Música</button>
    <button class="btn" onclick="window.open('https://wa.me/558481625194')">📱 Usar Bot</button>
  </div>  <div class="chat-box" id="chat"></div>
</section><section class="section" id="funcoes">
  <h2>⚡ Funções da Yoru</h2>
  <div class="grid">
    <div class="card">🛡️ Anti-link automático</div>
    <div class="card">🚫 Anti mídia total</div>
    <div class="card">🤖 Anti-bot inteligente</div>
    <div class="card">📊 Sistema de registro</div>
    <div class="card">🎮 Diversão interativa</div>
    <div class="card">📥 Downloads rápidos</div>
  </div>
</section><section class="section" id="status">
  <h2>📊 Status</h2>
  <div class="status" id="statusText">Conectando...</div>
</section><footer>
  © 2026 - Yoru Bot • Feito pelo Lucianz
</footer><audio id="music" loop>
  <source src="https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3">
</audio><script>
// musica
let music = document.getElementById("music")
function toggleMusic(){
  music.paused ? music.play() : music.pause()
}

// status
setInterval(()=>{
  let uptime = (99 + Math.random()).toFixed(2)
  document.getElementById("statusText").innerText = "Online ✅ • " + uptime + "% uptime"
},2000)

// typing effect
let text = "Automação poderosa • Proteção • Diversão"
let i = 0
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i)
    i++
    setTimeout(typing,40)
  }
}
typing()

// chat fake
let chat = document.getElementById("chat")
let msgs = [
  "&menu",
  "Carregando comandos...",
  "&casal",
  "💘 Casal do grupo: @user1 + @user2",
  "&play música",
  "🎶 Baixando música..."
]

let c = 0
function fakeChat(){
  if(c < msgs.length){
    let div = document.createElement("div")
    div.className = "msg " + (c%2==0 ? "user" : "bot")
    div.innerText = msgs[c]
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
    c++
    setTimeout(fakeChat,1200)
  }
}
fakeChat()
</script></body>
</html>
