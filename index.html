<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#040406;
  color:#fff;
  overflow-x:hidden;
}

/* FUNDO COM GLOW */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,77,136,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,77,136,0.1), transparent 40%);
  z-index:-1;
}

/* CONTAINER */
.container{
  max-width:850px;
  margin:80px auto;
  padding:20px;
}

/* CARD */
.main{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:40px 25px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 60px rgba(255,77,136,0.1);
  text-align:center;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.logo{
  font-family:'Orbitron';
  letter-spacing:2px;
  color:#ff4d88;
}

.time{
  background:rgba(255,255,255,0.05);
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:8px 18px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  font-size:13px;
  margin-bottom:20px;
}

/* TITULO */
h1{
  font-size:2.4rem;
  margin-bottom:15px;
}

p{
  opacity:0.6;
  font-size:14px;
  max-width:500px;
  margin:auto;
  line-height:1.6;
}

/* BOTÃO PRINCIPAL */
.btn{
  margin-top:30px;
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  background:linear-gradient(135deg,#ff4d88,#ff2a6d);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(255,77,136,0.6);
}

/* TAGS */
.tags{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.tag{
  background:rgba(255,255,255,0.05);
  padding:8px 14px;
  border-radius:20px;
  font-size:12px;
}

/* CONTROLES */
.controls{
  margin-top:25px;
  display:flex;
  gap:10px;
  justify-content:center;
}

.small-btn{
  padding:10px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

.small-btn:hover{
  background:rgba(255,255,255,0.1);
}

/* FOTO */
.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  margin:20px auto;
  box-shadow:0 0 30px rgba(255,77,136,0.5);
  object-fit:cover;
}


/* BOTÃO 3 PONTOS */
.menu-btn{
  position:fixed;
  top:20px;
  right:20px;
  font-size:22px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:rgba(10,10,15,0.95);
  backdrop-filter:blur(20px);
  padding:25px;
  transition:.4s;
  z-index:999;
}

.menu.active{
  right:0;
}

.menu h3{
  font-size:14px;
  margin-bottom:10px;
}

.menu button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  margin-top:10px;
}

/* CORES */
.colors{
  display:flex;
  gap:10px;
}

.color{
  width:25px;
  height:25px;
  border-radius:50%;
  cursor:pointer;
}

.pink{background:#ff4d88}
.blue{background:#4da6ff}
.purple{background:#a64dff}
.green{background:#4dff88}

</style>
</head>

<body>

<div class="container">

<div class="main">

<!-- MENU BOTÃO -->
<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<!-- MENU LATERAL -->
<div class="menu" id="menu">
  <h3>Perfil</h3>
  <p style="opacity:.6">Yoru System ativo</p>

  <h3 style="margin-top:20px">Tema</h3>
  <div class="colors">
    <div class="color pink" onclick="setColor('#ff4d88')"></div>
    <div class="color blue" onclick="setColor('#4da6ff')"></div>
    <div class="color purple" onclick="setColor('#a64dff')"></div>
    <div class="color green" onclick="setColor('#4dff88')"></div>
  </div>

  <h3 style="margin-top:20px">Config</h3>
  <button onclick="toggleMusic()">Tocar música</button>
</div>

<div class="top">
  <div class="logo">YORU SYSTEM</div>
  <div class="time" id="time"></div>
</div>

<img class="avatar" src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">

<div class="badge">Sistema ativo</div>

<h1>Automação com presença e controle real.</h1>

<p>
Projetado para grupos que precisam de estabilidade, resposta rápida e uma estrutura que funciona sem falhas.
</p>

<button class="btn" onclick="window.open('https://whatsapp.com/channel/0029Vb5wx3GId7nT87R9gn3L')">
Canal Oficial
</button>

<div class="tags">
  <div class="tag">alto desempenho</div>
  <div class="tag">estrutura estável</div>
  <div class="tag">integração simples</div>
</div>

<div class="controls">
  <button class="small-btn" onclick="toggleMusic()">Música</button>
  <button class="small-btn" onclick="nextMusic()">Próxima</button>
  <button class="small-btn" onclick="window.open('https://wa.me/558481625194')">Dono</button>
</div>

</div>
</div>

<audio id="music"></audio>

<script>
setInterval(()=>{
 let d = new Date()
 let h = String(d.getHours()).padStart(2,'0')
 let m = String(d.getMinutes()).padStart(2,'0')
 let s = String(d.getSeconds()).padStart(2,'0')
 document.getElementById("time").innerText = `${h}:${m}:${s}`
},1000)

// música
let playlist=[
\"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3\",
\"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/7713x1kpz.mp3\"
]

let i=0
let music=document.getElementById(\"music\")
music.src=playlist[i]

function toggleMusic(){
 music.paused ? music.play() : music.pause()
}

function nextMusic(){
 i=(i+1)%playlist.length
 music.src=playlist[i]
 music.play()
}

music.addEventListener(\"ended\",nextMusic)

// MENU
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active")
}

// TROCAR COR
function setColor(color){
  document.querySelector(".btn").style.background = color
  document.querySelector(".logo").style.color = color
}
</script>

</body>
</html>
