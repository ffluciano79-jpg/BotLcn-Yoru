<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot Final</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#040409;
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba') center/cover;
  opacity:0.2;
  z-index:-2;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:10;
}

nav h1{
  color:#ff0055;
  font-family:'Orbitron';
}

nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
  position:relative;
}

nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:#ff0055;
  left:0;
  bottom:-4px;
  transition:.3s;
}

nav a:hover::after{width:100%}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:140px;
  border-radius:50%;
  box-shadow:0 0 40px #ff0055;
  animation:float 3s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

.hero h2{
  font-size:3rem;
  font-family:'Orbitron';
}

.btn{
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#ff0055,#ff3c8d);
  color:#fff;
  cursor:pointer;
  margin:8px;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #ff0055;
}

.btn-secondary{
  background:#111;
  border:1px solid #ff0055;
}

.chat-box{
  margin-top:30px;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:15px;
  width:280px;
  height:160px;
  overflow:auto;
  font-size:13px;
}

.msg{margin:5px 0}
.bot{color:#00ffc8}
.user{text-align:right}

.section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  border:1px solid rgba(255,0,100,0.2);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px rgba(255,0,100,0.4);
}

.status{
  font-size:1.5rem;
  color:#00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.4}
  100%{opacity:1}
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style></head><body><nav>
  <h1>Yoru</h1>
  <div>
    <a href="#">Início</a>
    <a href="#funcoes">Funções</a>
    <a href="#status">Status</a>
  </div>
</nav><section class="hero">
  <img src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">
  <h2>Yoru Bot</h2>
  <p id="typing"></p>  <div>
    <button class="btn" onclick="toggleMusic()">🎵 Play / Pause</button>
    <button class="btn btn-secondary" onclick="nextMusic()">⏭ Próxima Música</button>
    <button class="btn" onclick="window.open('https://wa.me/558481625194')">📱 Usar Bot</button>
  </div>  <div class="chat-box" id="chat"></div>
</section><section class="section" id="funcoes">
  <h2>⚡ Funções da Yoru</h2>
  <div class="grid">
    <div class="card">🛡️ Anti-link automático</div>
    <div class="card">🚫 Anti mídia total</div>
    <div class="card">🤖 Anti-bot inteligente</div>
    <div class="card">📊 Sistema de registro</div>
    <div class="card">🎮 Diversão interativa</div>
    <div class="card">📥 Downloads rápidos</div>
    <div class="card">⚙️ Sistema avançado</div>
    <div class="card">🚀 Alta performance</div>
  </div>
</section><section class="section" id="status">
  <h2>📊 Status</h2>
  <div class="status" id="statusText">Conectando...</div>
</section><footer>
  © 2026 - Yoru Bot Final
</footer><audio id="music"></audio>

<script>
// PLAYLIST
let playlist = [
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/track2.mp3",
"https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/track3.mp3"
]

let index = 0
let music = document.getElementById("music")
music.src = playlist[index]

function toggleMusic(){
  music.paused ? music.play() : music.pause()
}

function nextMusic(){
  index = (index + 1) % playlist.length
  music.src = playlist[index]
  music.play()
}

// AUTO NEXT
music.addEventListener("ended", nextMusic)

// STATUS
setInterval(()=>{
  let uptime = (99 + Math.random()).toFixed(2)
  document.getElementById("statusText").innerText = "Online ✅ • " + uptime + "% uptime"
},2000)

// TYPING
let text = "Automação poderosa • Proteção • Diversão"
let i = 0
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i)
    i++
    setTimeout(typing,35)
  }
}
typing()

// CHAT
let chat = document.getElementById("chat")
let msgs = [
"&menu",
"Carregando comandos...",
"&casal",
"💘 Casal: @user1 + @user2",
"&play música",
"🎶 Baixando música...",
"Download completo ✅"
]

let c = 0
function fakeChat(){
  if(c < msgs.length){
    let div = document.createElement("div")
    div.className = "msg " + (c%2==0 ? "user" : "bot")
    div.innerText = msgs[c]
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
    c++
    setTimeout(fakeChat,1000)
  }
}
fakeChat()
</script></body>
</html>
