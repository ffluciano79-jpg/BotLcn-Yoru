<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--main-color:#ff4d88;}

body{
 font-family:'Inter',sans-serif;
 background:#040406;
 color:#fff;
 overflow-x:hidden;
}

/* LOADING */
#loading{
 position:fixed;inset:0;background:#040406;
 display:flex;align-items:center;justify-content:center;
 z-index:9999;
}
.loader-box{
 width:90%;max-width:320px;padding:30px 20px;
 border-radius:30px;background:rgba(255,255,255,0.03);
 backdrop-filter:blur(20px);text-align:center;
}
.loader-img{width:90px;height:90px;margin:auto;border-radius:20px;overflow:hidden;animation:spin 3s infinite}
.loader-img img{width:100%;height:100%;object-fit:cover;}
@keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

.loader-bar{height:6px;background:#222;border-radius:10px;margin-top:10px;overflow:hidden}
.loader-progress{height:100%;width:0;background:var(--main-color);animation:load 3s forwards}
@keyframes load{to{width:100%}}

/* MENU */
.menu-btn{
 position:fixed;top:20px;right:20px;
 background:#111;padding:10px;border-radius:10px;z-index:10;
}
.menu{
 position:fixed;top:0;right:-260px;width:260px;height:100%;
 background:#0a0a0f;padding:20px;transition:.3s;
 display:flex;flex-direction:column;gap:10px;z-index:10;
}
.menu.active{right:0;}

.menu-slider{
 width:100%;
 appearance:none;
 height:6px;
 background:#222;
 border-radius:10px;
 outline:none;
}
.menu-slider::-webkit-slider-thumb{
 appearance:none;
 width:14px;height:14px;
 border-radius:50%;
 background:var(--main-color);
 cursor:pointer;
 box-shadow:0 0 10px var(--main-color);
}

/* MAIN */
.container{max-width:850px;margin:80px auto;padding:20px;}
.main{
 background:rgba(255,255,255,0.04);
 backdrop-filter:blur(20px);
 border-radius:30px;
 padding:40px;
 text-align:center;
}
.avatar{
 width:100px;height:100px;border-radius:50%;
 margin:20px auto;
 box-shadow:0 0 30px var(--main-color);
}
.btn{
 width:100%;padding:15px;margin-top:20px;
 background:var(--main-color);
 border:none;border-radius:15px;color:#fff;
}
</style>
</head>

<body>

<div id="loading">
 <div class="loader-box">
  <div class="loader-img">
   <img src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">
  </div>
  <h2>YORU SYSTEM</h2>
  <p>By Lucianz</p>
  <div class="loader-bar"><div class="loader-progress"></div></div>
 </div>
</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
<button onclick="toggleMenu()">← Voltar</button>

<h3>Tema</h3>
<input type="color" onchange="setColor(this.value)">

<h3>Volume</h3>
<input type="range" min="0" max="1" step="0.01" class="menu-slider" oninput="setVolume(this.value)">

<h3>Progresso</h3>
<input type="range" min="0" max="100" class="menu-slider" id="seekbar" oninput="seekMenu(this.value)">
</div>

<div class="container">
<div class="main">
<h1>YORU SYSTEM</h1>

<img class="avatar" src="https://i.ibb.co/6RCGNGD4/bf962842325b.jpg">

<button class="btn" onclick="toggleMusic()">Play / Pause</button>
</div>
</div>

<audio id="music"></audio>

<script>
let music=document.getElementById("music")
music.src="https://raw.githubusercontent.com/dylanModz/uploads/main/midias/audios/527eu4coi.mp3"

function toggleMusic(){music.paused?music.play():music.pause()}

function setVolume(v){music.volume=v}

function seekMenu(v){
 if(music.duration){
  music.currentTime=(v/100)*music.duration
 }
}

function toggleMenu(){
 document.getElementById("menu").classList.toggle("active")
}

function setColor(c){
 document.documentElement.style.setProperty('--main-color',c)
}

window.onload=()=>{
 setTimeout(()=>{document.getElementById("loading").style.display="none"},3000)
}

music.addEventListener("timeupdate",()=>{
 let bar=document.getElementById("seekbar")
 if(music.duration){
  bar.value=(music.currentTime/music.duration)*100
 }
})
</script>

</body>
</html>
