<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoru Bot</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* HEADER */
header {
  padding: 25px;
}

header h1 {
  font-size: 2.5rem;
  color: #ff0055;
}

header p {
  opacity: 0.7;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 0 15px rgba(255,0,100,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* BOTÕES */
button {
  background: #ff0055;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  background: #ff3366;
}

/* STATUS */
.status {
  display: flex;
  justify-content: space-between;
}

/* JOGO */
#gameBox {
  margin-top: 15px;
}

#target {
  width: 60px;
  height: 60px;
  background: #ff0055;
  border-radius: 50%;
  position: relative;
  margin: 20px auto;
  cursor: pointer;
  display: none;
}

.score {
  font-size: 18px;
  margin-top: 10px;
}

/* FOOTER */
footer {
  margin-top: 20px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>
  <h1>🤖 Yoru Bot</h1>
  <p>Um bot feito por um cara entediado.</p>
</header>

<div class="container">

  <!-- SOBRE -->
  <div class="card">
    <h2>📌 Sobre</h2>
    <p>Bot criado para diversão, moderação e utilidades.</p>
  </div>

  <!-- COMANDOS -->
  <div class="card">
    <h2>⚙️ Comandos</h2>
    <p>🩸 &menu</p>
    <p>😂 &casal</p>
    <p>🎵 &play</p>
    <p>🕷 &dono</p>
    <p>🤖 &yoru</p>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h2>📊 Status</h2>
    <div class="status">
      <span>Bot:</span>
      <span style="color:#00ff88;">Online ✅</span>
    </div>
    <div class="status">
      <span>Versão:</span>
      <span>1.6.0</span>
    </div>
  </div>

  <!-- INTERAÇÃO -->
  <div class="card">
    <h2>🚀 Interação</h2>
    <button onclick="mensagem()">Mensagem</button>
    <button onclick="mudarCor()">Mudar cor</button>
  </div>

  <!-- JOGO -->
  <div class="card">
    <h2>🎮 Mini Jogo (Clique rápido)</h2>
    <button onclick="startGame()">Iniciar Jogo</button>

    <div id="gameBox">
      <div id="target"></div>
      <div class="score">Pontuação: <span id="score">0</span></div>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 - Criado por Lucianz</p>
</footer>

<script>
let score = 0
let gameActive = false

function mensagem() {
  alert("🔥 Bem-vindo ao Yoru Bot!")
}

function mudarCor() {
  document.body.style.background =
    "linear-gradient(135deg, #" + Math.floor(Math.random()*999999) + ", #000)"
}

<div class="card">
  <h2>🎮 Jogo do Bot (Pular Obstáculos)</h2>
  <p>Aperta ESPAÇO ou toca na tela pra pular</p>

  <canvas id="game" width="300" height="150"></canvas>
  <p>Pontuação: <span id="score">0</span></p>
  <button onclick="startGame()">Iniciar</button>
</div>

<script>
let canvas = document.getElementById("game")
let ctx = canvas.getContext("2d")

let player = { x: 20, y: 110, w: 20, h: 20, vy: 0 }
let gravity = 1.5
let obstacle = { x: 300, y: 110, w: 20, h: 20 }
let score = 0
let running = false

function startGame() {
  player.y = 110
  player.vy = 0
  obstacle.x = 300
  score = 0
  running = true
  loop()
}

function loop() {
  if (!running) return

  ctx.clearRect(0, 0, 300, 150)

  // player
  player.vy += gravity
  player.y += player.vy

  if (player.y > 110) {
    player.y = 110
    player.vy = 0
  }

  ctx.fillStyle = "white"
  ctx.fillRect(player.x, player.y, player.w, player.h)

  // obstacle
  obstacle.x -= 5
  if (obstacle.x < -20) {
    obstacle.x = 300
    score++
    document.getElementById("score").innerText = score
  }

  ctx.fillStyle = "red"
  ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h)

  // colisão
  if (
    player.x < obstacle.x + obstacle.w &&
    player.x + player.w > obstacle.x &&
    player.y < obstacle.y + obstacle.h &&
    player.y + player.h > obstacle.y
  ) {
    running = false
    alert("💀 Game Over! Pontuação: " + score)
    return
  }

  requestAnimationFrame(loop)
}

// pular
document.addEventListener("keydown", e => {
  if (e.code === "Space" && player.y === 110) {
    player.vy = -12
  }
})

// toque mobile
canvas.addEventListener("touchstart", () => {
  if (player.y === 110) {
    player.vy = -12
  }
})
</script>

</body>
</html>
